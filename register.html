<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Auro Adornment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1500&q=80");
background-size:cover;
background-position:center;
}

.register-box{
width:90%;
max-width:420px;
background:rgba(255,255,255,.95);
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#b8860b;
letter-spacing:2px;
margin-bottom:10px;
}

h2{
margin-bottom:8px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:13px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#b8860b;
}

button{
width:100%;
padding:14px;
background:#b8860b;
color:#fff;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#8d6902;
}

.login{
margin-top:18px;
font-size:15px;
}

.login a{
text-decoration:none;
color:#b8860b;
font-weight:bold;
}

@media(max-width:480px){

.register-box{
padding:25px;
}

.logo{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">AURO ADORNMENT</div>

<h2>Create Account</h2>

<p>Join us and discover timeless luxury jewellery.</p>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

</form>

<div class="login">

Already have an account?

<a href="login.html">Login</a>

</div>

</div>

</body>
</html>
