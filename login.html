<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Auro Adornment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.login-box{
width:90%;
max-width:400px;
background:rgba(255,255,255,.95);
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#b8860b;
letter-spacing:2px;
margin-bottom:10px;
}

h2{
margin-bottom:8px;
}

p{
color:#666;
margin-bottom:25px;
font-size:15px;
}

.input-box{
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#b8860b;
}

.options{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:20px;
}

.options a{
text-decoration:none;
color:#b8860b;
}

button{
width:100%;
padding:14px;
background:#b8860b;
color:#fff;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#8d6902;
}

.signup{
margin-top:20px;
font-size:15px;
}

.signup a{
text-decoration:none;
color:#b8860b;
font-weight:bold;
}

.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.social a{
width:42px;
height:42px;
background:#f3f3f3;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
font-size:18px;
transition:.3s;
}

.social a:hover{
background:#b8860b;
color:#fff;
}

@media(max-width:480px){

.login-box{
padding:30px 20px;
}

.logo{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">AURO ADORNMENT</div>

<h2>Welcome Back</h2>

<p>Login to explore our luxury jewellery collection.</p>

<form>

<div class="input-box">
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">Login</button>

</form>

<div class="signup">
Don't have an account?
<a href="register.html">Register</a>
</div>

<div class="social">
<a href="#">📘</a>
<a href="#">🟢</a>
<a href="#">📷</a>
</div>

</div>

</body>
</html>
