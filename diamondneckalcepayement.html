<!DOCTYPE html>
<html>
<head>
<title>Auro Adornment | Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#f7f3eb,#f0ece4,#fff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.payment{
width:430px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo{
text-align:center;
font-size:28px;
color:#c89b2b;
font-weight:bold;
margin-bottom:5px;
}

.small{
text-align:center;
color:#777;
margin-bottom:25px;
}

.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border:1px solid #ececec;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:.3s;
}

.option:hover{
border-color:#c89b2b;
background:#fff9ef;
transform:translateY(-2px);
}

input{
width:100%;
padding:14px;
border:none;
background:#f6f6f6;
margin:10px 0;
border-radius:10px;
outline:none;
font-size:15px;
}

.row{
display:flex;
gap:10px;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#d4af37,#b8860b);
color:white;
border:none;
border-radius:40px;
font-size:17px;
font-weight:600;
cursor:pointer;
margin-top:15px;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.price{
display:flex;
justify-content:space-between;
margin:20px 0;
font-size:18px;
font-weight:bold;
color:#444;
}

.secure{
text-align:center;
margin-top:18px;
color:#18a558;
font-size:14px;
}

</style>

</head>

<body>

<div class="payment">

<div class="logo">✦ Auro Adornment</div>

<p class="small">Luxury Secure Checkout</p>

<div class="option">
<span>💳 Credit / Debit Card</span>
<span>›</span>
</div>

<div class="option">
<span>📱 UPI Payment</span>
<span>›</span>
</div>

<div class="option">
<span>🏦 Net Banking</span>
<span>›</span>
</div>

<input type="text" placeholder="Card Number">

<input type="text" placeholder="Card Holder Name">

<div class="row">
<input type="text" placeholder="MM/YY">
<input type="password" placeholder="CVV">
</div>

<div class="price">
<span>Total</span>
<span>₹52,499</span>
</div>

<button>Pay Securely 🔒</button>

<div class="secure">
✔ SSL Encrypted • 100% Secure Payment
</div>

</div>

</body>
</html>
